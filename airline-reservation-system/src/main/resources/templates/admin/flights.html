<!doctype html><html><head><title>Flights</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2>Manage Flights</h2><a class="btn btn-success mb-3" href="/admin/flights/new">Add Flight</a><table class="table bg-white"><tr><th>No</th><th>Airline</th><th>Route</th><th>Date</th><th>Price</th><th>Seats</th><th>Status</th><th>Actions</th></tr><tr th:each="f:${flights}"><td th:text="${f.flightNumber}"></td><td th:text="${f.airlineName}"></td><td th:text="${f.source+' to '+f.destination}"></td><td th:text="${f.departureDate}"></td><td th:text="${f.price}"></td><td th:text="${f.availableSeats+'/'+f.totalSeats}"></td><td th:text="${f.status}"></td><td><a class="btn btn-sm btn-warning" th:href="@{/admin/flights/{id}/edit(id=${f.id})}">Edit</a><form class="d-inline" method="post" th:action="@{/admin/flights/{id}/delete(id=${f.id})}"><button class="btn btn-sm btn-danger" onclick="return confirm('Delete flight?')">Delete</button></form></td></tr></table></div></body></html>
