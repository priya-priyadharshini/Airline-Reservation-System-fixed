<!doctype html><html><head><title>Admin Dashboard</title><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2 class="fw-bold">Admin Dashboard</h2><p class="small-muted">Manage flight operations, users, bookings and revenue.</p><div class="row g-3"><div class="col-md-3"><div class="card stat-card p-3"><h6>Total Flights</h6><h2 th:text="${flightCount}"></h2></div></div><div class="col-md-3"><div class="card stat-card p-3"><h6>Total Users</h6><h2 th:text="${userCount}"></h2></div></div><div class="col-md-3"><div class="card stat-card p-3"><h6>Total Bookings</h6><h2 th:text="${bookingCount}"></h2></div></div><div class="col-md-3"><div class="card stat-card p-3"><h6>Revenue</h6><h2>₹<span th:text="${revenue}"></span></h2></div></div></div><div class="card p-4 mt-4"><h4>Quick Actions</h4><div><a class="btn btn-primary" href="/admin/flights">Manage Flights</a> <a class="btn btn-success" href="/admin/flights/new">Add Flight</a> <a class="btn btn-primary" href="/admin/users">Manage Users</a> <a class="btn btn-primary" href="/admin/bookings">Manage Bookings</a></div></div></div></body></html>
