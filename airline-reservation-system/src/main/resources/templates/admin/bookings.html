<!doctype html><html><head><title>Bookings</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2>Manage Bookings</h2><table class="table bg-white"><tr><th>PNR</th><th>User</th><th>Flight</th><th>Seats</th><th>Amount</th><th>Status</th><th>Action</th></tr><tr th:each="b:${bookings}"><td th:text="${b.pnr}"></td><td th:text="${b.user.email}"></td><td th:text="${b.flight.flightNumber}"></td><td th:text="${b.seatCount}"></td><td th:text="${b.totalAmount}"></td><td th:text="${b.status}"></td><td><form method="post" th:action="@{/admin/bookings/{id}/cancel(id=${b.id})}" th:if="${b.status.name()=='CONFIRMED'}"><button class="btn btn-sm btn-danger">Cancel</button></form></td></tr></table></div></body></html>
