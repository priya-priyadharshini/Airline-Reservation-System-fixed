<!doctype html><html><head><title>Passenger Details</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2>Passenger Details</h2><form method="post" th:action="@{/user/book/{id}/payment(id=${flight.id})}"><input type="hidden" th:each="sid:${seatIds}" name="seatIds" th:value="${sid}"><div class="card p-3 mb-2" th:each="sid,stat:${seatIds}"><h5>Passenger <span th:text="${stat.index+1}"></span></h5><input class="form-control my-1" name="names" placeholder="Passenger Name" required><input class="form-control my-1" type="number" name="ages" placeholder="Age" min="1" required><select class="form-select my-1" name="genders"><option>Female</option><option>Male</option><option>Other</option></select></div><button class="btn btn-primary">Continue to Payment</button></form></div></body></html>
