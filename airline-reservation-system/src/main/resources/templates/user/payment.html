<!doctype html><html><head><title>Payment</title><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><div class="row"><div class="col-md-7"><h2 class="fw-bold">Secure Payment</h2><div class="paybox"><form method="post" th:action="@{/user/book/{id}/confirm(id=${flight.id})}"><input type="hidden" th:each="sid:${seatIds}" name="seatIds" th:value="${sid}"><input type="hidden" th:each="n:${names}" name="names" th:value="${n}"><input type="hidden" th:each="a:${ages}" name="ages" th:value="${a}"><input type="hidden" th:each="g:${genders}" name="genders" th:value="${g}"><label>Payment Method</label><select class="form-select mb-3" name="method" required><option>Credit Card</option><option>Debit Card</option><option>UPI</option><option>Net Banking</option><option>Wallet</option></select><label>Card Holder / Account Name</label><input class="form-control mb-2" name="holderName" placeholder="Name as per card/account" required><label>Card Number</label><input class="form-control mb-2" name="cardNumber" placeholder="Mock card number" pattern="^[0-9]{12,19}$" title="Enter 12 to 19 digit card number"><div class="row"><div class="col"><label>Expiry</label><input class="form-control mb-2" placeholder="MM/YY" pattern="^(0[1-9]|1[0-2])\/\d{2}$" title="Use MM/YY format"></div><div class="col"><label>CVV</label><input class="form-control mb-2" placeholder="123" pattern="^[0-9]{3,4}$"></div></div><label>UPI ID</label><input class="form-control mb-2" name="upiId" placeholder="example@upi"><p class="small-muted">Demo gateway only. No real money is charged.</p><button class="btn btn-success mt-2">Pay & Generate Ticket</button></form></div></div><div class="col-md-5"><div class="card p-4"><h4>Fare Summary</h4><p>Flight: <b th:text="${flight.flightNumber}"></b></p><p>Route: <span th:text="${flight.source+' → '+flight.destination}"></span></p><p>Selected seats: <b th:text="${#lists.size(seatIds)}"></b></p><hr><h3>Total: ₹<span th:text="${amount}"></span></h3></div></div></div></div></body></html>
