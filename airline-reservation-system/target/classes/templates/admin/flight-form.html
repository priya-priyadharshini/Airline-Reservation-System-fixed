<!doctype html><html><head><title>Flight Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><div class="card p-4"><h2>Flight Form</h2><form method="post" action="/admin/flights/save" th:object="${flight}"><input type="hidden" th:field="*{id}"><div class="row"><div class="col"><label>Flight Number</label><input class="form-control" th:field="*{flightNumber}" required></div><div class="col"><label>Airline</label><input class="form-control" th:field="*{airlineName}" required></div></div><div class="row mt-2"><div class="col"><label>Source</label><input class="form-control" th:field="*{source}" required></div><div class="col"><label>Destination</label><input class="form-control" th:field="*{destination}" required></div></div><div class="row mt-2"><div class="col"><label>Departure Date</label><input class="form-control" type="date" th:field="*{departureDate}" required></div><div class="col"><label>Departure Time</label><input class="form-control" type="time" th:field="*{departureTime}" required></div></div><div class="row mt-2"><div class="col"><label>Arrival Date</label><input class="form-control" type="date" th:field="*{arrivalDate}" required></div><div class="col"><label>Arrival Time</label><input class="form-control" type="time" th:field="*{arrivalTime}" required></div></div><div class="row mt-2"><div class="col"><label>Price</label><input class="form-control" type="number" th:field="*{price}" required></div><div class="col"><label>Total Seats</label><input class="form-control" type="number" th:field="*{totalSeats}" required></div><div class="col"><label>Available Seats</label><input class="form-control" type="number" th:field="*{availableSeats}" required></div></div><label class="mt-2">Status</label><select class="form-select" th:field="*{status}"><option th:each="s:${statuses}" th:value="${s}" th:text="${s}"></option></select><button class="btn btn-success mt-3">Save Flight</button></form></div></div></body></html>
