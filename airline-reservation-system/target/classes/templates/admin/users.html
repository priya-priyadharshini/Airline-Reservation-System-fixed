<!doctype html><html><head><title>Users</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2>Manage Users</h2><table class="table bg-white"><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Active</th><th>Actions</th></tr><tr th:each="u:${users}"><td th:text="${u.fullName}"></td><td th:text="${u.email}"></td><td th:text="${u.phone}"></td><td th:text="${u.role}"></td><td th:text="${u.active}"></td><td><form class="d-inline" method="post" th:action="@{/admin/users/{id}/toggle(id=${u.id})}"><button class="btn btn-sm btn-warning">Activate/Deactivate</button></form><form class="d-inline" method="post" th:action="@{/admin/users/{id}/delete(id=${u.id})}"><button class="btn btn-sm btn-danger" onclick="return confirm('Delete user?')">Delete</button></form></td></tr></table></div></body></html>
