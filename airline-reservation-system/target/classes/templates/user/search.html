<!doctype html><html><head><title>Search Flights</title><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2 class="fw-bold">Search Flights</h2><form class="card p-3 row g-2 mb-4 flex-row"><div class="col-md-3"><input class="form-control" name="source" placeholder="Source" th:value="${source}"></div><div class="col-md-3"><input class="form-control" name="destination" placeholder="Destination" th:value="${destination}"></div><div class="col-md-3"><input class="form-control" type="date" name="date" th:value="${date}"></div><div class="col-md-3"><button class="btn btn-primary w-100">Search</button></div></form><div class="table-responsive"><table class="table bg-white align-middle"><tr><th>Flight</th><th>Airline</th><th>Route</th><th>Date</th><th>Time</th><th>Price</th><th>Seats</th><th></th></tr><tr th:each="f:${flights}"><td class="fw-bold" th:text="${f.flightNumber}"></td><td th:text="${f.airlineName}"></td><td th:text="${f.source+' to '+f.destination}"></td><td th:text="${f.departureDate}"></td><td th:text="${f.departureTime}"></td><td>₹<span th:text="${f.price}"></span></td><td th:text="${f.availableSeats}"></td><td><a class="btn btn-success btn-sm" th:href="@{/user/book/{id}(id=${f.id})}">Book</a></td></tr></table></div></div></body></html>
