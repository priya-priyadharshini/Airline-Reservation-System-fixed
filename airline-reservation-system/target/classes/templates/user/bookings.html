<!doctype html><html><head><title>My Bookings</title><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2 class="fw-bold">My Bookings</h2><div class="table-responsive"><table class="table bg-white align-middle"><tr><th>PNR</th><th>Flight</th><th>Route</th><th>Seats</th><th>Amount</th><th>Status</th><th>Actions</th></tr><tr th:each="b:${bookings}"><td class="fw-bold" th:text="${b.pnr}"></td><td th:text="${b.flight.flightNumber}"></td><td th:text="${b.flight.source+' → '+b.flight.destination}"></td><td th:text="${b.seatCount}"></td><td>₹<span th:text="${b.totalAmount}"></span></td><td><span class="badge" th:classappend="${' status-'+b.status}" th:text="${b.status}"></span></td><td><a class="btn btn-sm btn-primary" th:href="@{/user/ticket/{id}(id=${b.id})}">View</a><form class="d-inline" method="post" th:action="@{/user/bookings/{id}/cancel(id=${b.id})}" th:if="${b.status.name()=='CONFIRMED'}"><button class="btn btn-sm btn-danger" onclick="return confirm('Cancel booking?')">Cancel</button></form></td></tr></table></div></div></body></html>
