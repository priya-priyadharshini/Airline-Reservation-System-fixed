<!doctype html><html><head><title>Ticket</title><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><div class="ticket p-4"><div class="d-flex justify-content-between"><div><h2 class="fw-bold">E-Ticket</h2><p class="small-muted">Priya Airways booking confirmation</p></div><div class="text-end"><span class="badge fs-6" th:classappend="${' status-'+booking.status}" th:text="${booking.status}"></span><h5 class="mt-2">PNR: <span th:text="${booking.pnr}"></span></h5></div></div><hr><div class="row"><div class="col-md-6"><p><b>Ticket No:</b> <span th:text="${booking.ticket.ticketNumber}"></span></p><p><b>Flight:</b> <span th:text="${booking.flight.flightNumber+' - '+booking.flight.airlineName}"></span></p><p><b>Route:</b> <span th:text="${booking.flight.source+' to '+booking.flight.destination}"></span></p><p><b>Date:</b> <span th:text="${booking.flight.departureDate+' '+booking.flight.departureTime}"></span></p></div><div class="col-md-6"><p><b>Payment:</b> <span th:text="${booking.payment.method+' - '+booking.payment.status}"></span></p><p><b>Total:</b> ₹<span th:text="${booking.totalAmount}"></span></p><p><b>Booked By:</b> <span th:text="${booking.user.fullName}"></span></p></div></div><h5>Passengers</h5><table class="table"><tr><th>Name</th><th>Age</th><th>Gender</th><th>Seat</th></tr><tr th:each="p:${booking.passengers}"><td th:text="${p.name}"></td><td th:text="${p.age}"></td><td th:text="${p.gender}"></td><td class="fw-bold" th:text="${p.seatNumber}"></td></tr></table><div class="no-print"><a class="btn btn-primary" th:href="@{/user/ticket/{id}/download(id=${booking.id})}">Download PDF</a> <a class="btn btn-secondary" onclick="window.print()">Print</a> <a class="btn btn-outline-primary" href="/user/bookings">My Bookings</a></div></div></div></body></html>
