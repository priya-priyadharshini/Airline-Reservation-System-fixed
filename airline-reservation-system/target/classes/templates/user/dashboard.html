<!doctype html><html><head><title>User Dashboard</title><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><div class="d-flex justify-content-between align-items-center mb-3"><div><h2 class="fw-bold">User Dashboard</h2><p class="small-muted">Available flights ready for booking</p></div><div><a class="btn btn-primary" href="/user/search">Search Flights</a> <a class="btn btn-outline-primary" href="/user/bookings">My Bookings</a></div></div><div class="row"><div class="col-md-4 mb-3" th:each="f:${flights}"><div class="card flight-card p-3 h-100"><div class="d-flex justify-content-between"><h5 th:text="${f.flightNumber}"></h5><span class="badge badge-soft" th:text="${f.status}"></span></div><p class="mb-1 fw-bold" th:text="${f.airlineName}"></p><h5><span th:text="${f.source}"></span> ✈ <span th:text="${f.destination}"></span></h5><p class="small-muted" th:text="${f.departureDate+' | '+f.departureTime+' - '+f.arrivalTime}"></p><p class="mb-2">₹ <b th:text="${f.price}"></b> | Seats left: <b th:text="${f.availableSeats}"></b></p><a class="btn btn-success mt-auto" th:href="@{/user/book/{id}(id=${f.id})}">Select Seats</a></div></div></div></div></body></html>
