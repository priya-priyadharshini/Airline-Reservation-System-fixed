<!doctype html><html><head><title>Select Seats</title><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/css/style.css"></head><body><div th:replace="~{shared/nav :: nav}"></div><div class="container py-4"><h2 class="fw-bold">Select Seats</h2><div class="alert alert-info"><b th:text="${flight.flightNumber}"></b> <span th:text="${flight.source+' to '+flight.destination}"></span> | Price per seat ₹<span th:text="${flight.price}"></span></div><form method="post" th:action="@{/user/book/{id}/passengers(id=${flight.id})}" onsubmit="return document.querySelectorAll('input[name=seatIds]:checked').length>0 || (alert('Please select at least one seat'), false)"><div class="seat-map"><div class="text-center small-muted mb-3">FRONT OF AIRCRAFT</div><div class="d-flex flex-wrap justify-content-center"><label th:each="s:${seats}" th:class="${s.booked}? 'seat booked':'seat'"><input type="checkbox" name="seatIds" th:value="${s.id}" th:disabled="${s.booked}"><span><b th:text="${s.seatNumber}"></b><br><small th:text="${s.seatType}"></small></span></label></div><div class="mt-3"><span class="badge bg-light text-dark border">Available</span> <span class="badge bg-success">Selected</span> <span class="badge bg-danger">Booked</span></div></div><button class="btn btn-primary mt-3">Continue to Passenger Details</button></form></div></body></html>
